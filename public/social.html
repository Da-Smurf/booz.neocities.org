.tooltip .tooltip-text::after {

  top: 100%;
  left: 50%;

  border-width: 5px;
  border-style: solid;
  border-color: #555 transparent transparent transparent;
}

.tooltip:hover .tooltip-text {
  visibility: visible;
  opacity: 1;
}
